<svg viewBox="0 0 682 520" xmlns="http://www.w3.org/2000/svg">
  <title>Civilni hamer (HAM)  silueta</title>
  <desc>Boni prikaz civilnog Hummer-stila. Zone K/M/T/I/E/F crta aplikacija (viewBox 682×520).</desc>
  <rect width="682" height="520" fill="#faf9f5"/>

  <!-- Visoko podvozje / aasija -->
  <rect x="95" y="248" width="470" height="88" rx="6" fill="#cfcbc2" stroke="#5a5854" stroke-width="1.5"/>

  <!-- Kutijasta kabina (civilian Hummer) -->
  <path d="M175 248 L195 155 L420 155 L465 248 Z" fill="#e4e1d8" stroke="#5a5854" stroke-width="1.5"/>

  <!-- Vetrobran + bona stakla -->
  <path d="M205 245 L220 168 L285 168 L295 245 Z" fill="#b9d4e4" stroke="#6a8fa8" stroke-width="1" opacity="0.85"/>
  <path d="M305 245 L315 168 L400 168 L420 245 Z" fill="#b9d4e4" stroke="#6a8fa8" stroke-width="1" opacity="0.75"/>

  <!-- Prednji haub / motor -->
  <path d="M95 248 L110 210 L175 205 L175 248 Z" fill="#d8d4cb" stroke="#5a5854" stroke-width="1.3"/>
  <!-- Prednji branik / reaetka -->
  <rect x="88" y="255" width="22" height="52" rx="3" fill="#b8b4ab" stroke="#5a5854" stroke-width="1.1"/>
  <line x1="93" y1="268" x2="105" y2="268" stroke="#5a5854" stroke-width="1.2"/>
  <line x1="93" y1="280" x2="105" y2="280" stroke="#5a5854" stroke-width="1.2"/>
  <line x1="93" y1="292" x2="105" y2="292" stroke="#5a5854" stroke-width="1.2"/>

  <!-- Zadnji deo / rezervni nosa -->
  <path d="M465 248 L490 215 L550 220 L565 248 Z" fill="#d8d4cb" stroke="#5a5854" stroke-width="1.3"/>
  <rect x="552" y="255" width="20" height="50" rx="3" fill="#b8b4ab" stroke="#5a5854" stroke-width="1.1"/>
  <circle cx="540" cy="232" r="16" fill="#e8e6df" stroke="#5a5854" stroke-width="1.2"/>
  <circle cx="540" cy="232" r="8" fill="#cfcbc2" stroke="#5a5854" stroke-width="0.8"/>

  <!-- Krovni nosa -->
  <rect x="210" y="142" width="200" height="10" rx="2" fill="#b8b4ab" stroke="#5a5854" stroke-width="1"/>
  <line x1="230" y1="142" x2="230" y2="155" stroke="#5a5854" stroke-width="1.2"/>
  <line x1="390" y1="142" x2="390" y2="155" stroke="#5a5854" stroke-width="1.2"/>

  <!-- Veliki tokovi (terenski) -->
  <circle cx="195" cy="355" r="52" fill="#f0eee6" stroke="#5a5854" stroke-width="1.7"/>
  <circle cx="195" cy="355" r="34" fill="#d8d4cb" stroke="#6a6864" stroke-width="1.1"/>
  <circle cx="195" cy="355" r="12" fill="#8a8780"/>

  <circle cx="470" cy="355" r="52" fill="#f0eee6" stroke="#5a5854" stroke-width="1.7"/>
  <circle cx="470" cy="355" r="34" fill="#d8d4cb" stroke="#6a6864" stroke-width="1.1"/>
  <circle cx="470" cy="355" r="12" fill="#8a8780"/>

  <!-- Zemlja -->
  <line x1="60" y1="408" x2="620" y2="408" stroke="rgba(31,30,29,0.15)" stroke-width="0.8"/>

  <!-- Oznaka modela (sitno, van zona) -->
  <text x="341" y="490" text-anchor="middle" fill="#8a8780" font-family="Segoe UI, Arial, sans-serif" font-size="11">HAM  civilni hamer</text>
</svg>

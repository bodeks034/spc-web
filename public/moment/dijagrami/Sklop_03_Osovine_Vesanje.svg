<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780" font-family="Arial, sans-serif">
  <rect width="1000" height="780" fill="#ffffff"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E78">SKLOP: OSOVINE I VEŠANJE (SUSPENSION) — pozicije vijaka</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#595959">Brojevi pozicija odgovaraju koloni "Poz. br." u tabeli "Osovine i vešanje" (Excel šifrarnik)</text>

  <!-- Schematic: front axle assembly view -->
  <g stroke="#404040" stroke-width="2">
    <!-- Axle tube (horizontal beam) -->
    <rect x="150" y="330" width="700" height="45" rx="10" fill="#EAF1F8"/>
    <!-- Differential housing (center) -->
    <circle cx="500" cy="352" r="55" fill="#E2EFDA"/>
    <!-- Halfshafts -->
    <rect x="260" y="342" width="180" height="20" fill="#F2F2F2"/>
    <rect x="560" y="342" width="180" height="20" fill="#F2F2F2"/>
    <!-- Wheel hubs (geared hub circles at ends) -->
    <circle cx="200" cy="352" r="40" fill="#FCE4D6"/>
    <circle cx="800" cy="352" r="40" fill="#FCE4D6"/>
    <!-- Springs (leaf spring rectangles above axle) -->
    <rect x="230" y="260" width="150" height="14" rx="6" fill="#FFF2CC"/>
    <rect x="620" y="260" width="150" height="14" rx="6" fill="#FFF2CC"/>
    <!-- U-bolts holding spring to axle -->
    <rect x="270" y="274" width="14" height="56" fill="#D9E1F2"/>
    <rect x="330" y="274" width="14" height="56" fill="#D9E1F2"/>
    <rect x="656" y="274" width="14" height="56" fill="#D9E1F2"/>
    <rect x="716" y="274" width="14" height="56" fill="#D9E1F2"/>
    <!-- Shock absorbers (diagonal lines to chassis) -->
    <line x1="220" y1="220" x2="220" y2="330" stroke="#8497B0" stroke-width="6"/>
    <line x1="780" y1="220" x2="780" y2="330" stroke="#8497B0" stroke-width="6"/>
    <!-- Chassis rail (top) -->
    <rect x="100" y="195" width="800" height="20" rx="4" fill="#D9D9D9"/>
    <!-- Sway bar link -->
    <line x1="300" y1="215" x2="300" y2="255" stroke="#548235" stroke-width="5"/>
    <line x1="700" y1="215" x2="700" y2="255" stroke="#548235" stroke-width="5"/>
    <!-- Control arm -->
    <rect x="380" y="215" width="240" height="12" fill="#8497B0"/>
  </g>

  <text x="500" y="415" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">diferencijal / osovina</text>
  <text x="200" y="410" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">geared hub (levo)</text>
  <text x="800" y="410" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">geared hub (desno)</text>
  <text x="305" y="250" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">opružno vešanje</text>
  <text x="220" y="210" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">amortizer</text>
  <text x="500" y="188" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">šasija (rail)</text>
  <text x="500" y="245" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">kontrolno rame</text>

  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 1 halfshaft to flange (near hubs) -->
    <circle cx="240" cy="352" r="13" fill="#C00000"/><text x="240" y="357" font-size="11">1</text>
    <circle cx="760" cy="352" r="13" fill="#C00000"/><text x="760" y="357" font-size="11">1</text>

    <!-- 2/3 wheel half lock-nut (initial/final - same spot, staged) -->
    <circle cx="200" cy="352" r="15" fill="#C00000"/><text x="200" y="357" font-size="10">2/3</text>
    <circle cx="800" cy="352" r="15" fill="#C00000"/><text x="800" y="357" font-size="10">2/3</text>

    <!-- 4 halfshaft to drive gear bolt (near diff) -->
    <circle cx="460" cy="352" r="13" fill="#C00000"/><text x="460" y="357" font-size="11">4</text>
    <circle cx="540" cy="352" r="13" fill="#C00000"/><text x="540" y="357" font-size="11">4</text>

    <!-- 5 access plug half-shaft bolt -->
    <circle cx="280" cy="330" r="11" fill="#7F7F7F"/><text x="280" y="334" font-size="10">5</text>

    <!-- 6 drain/fill plug osovina -->
    <circle cx="500" cy="405" r="13" fill="#7F7F7F"/><text x="500" y="410" font-size="11">6</text>

    <!-- 7 amortizer donji nosac -->
    <circle cx="220" cy="330" r="12" fill="#C00000"/><text x="220" y="335" font-size="10">7</text>
    <circle cx="780" cy="330" r="12" fill="#C00000"/><text x="780" y="335" font-size="10">7</text>

    <!-- 8 amortizer gornji nosac -->
    <circle cx="220" cy="218" r="12" fill="#C00000"/><text x="220" y="222" font-size="10">8</text>
    <circle cx="780" cy="218" r="12" fill="#C00000"/><text x="780" y="222" font-size="10">8</text>

    <!-- 9 U-bolt spring -->
    <circle cx="277" cy="278" r="11" fill="#C00000"/><text x="277" y="282" font-size="10">9</text>
    <circle cx="337" cy="278" r="11" fill="#C00000"/><text x="337" y="282" font-size="10">9</text>
    <circle cx="663" cy="278" r="11" fill="#C00000"/><text x="663" y="282" font-size="10">9</text>
    <circle cx="723" cy="278" r="11" fill="#C00000"/><text x="723" y="282" font-size="10">9</text>

    <!-- 10 sway bar link -->
    <circle cx="300" cy="215" r="12" fill="#ED7D31"/><text x="300" y="220" font-size="10">10</text>
    <circle cx="700" cy="215" r="12" fill="#ED7D31"/><text x="700" y="220" font-size="10">10</text>

    <!-- 11 control arm na sasiju -->
    <circle cx="390" cy="221" r="12" fill="#C00000"/><text x="390" y="226" font-size="10">11</text>
    <circle cx="610" cy="221" r="12" fill="#C00000"/><text x="610" y="226" font-size="10">11</text>
  </g>

  <!-- Legend -->
  <g font-size="12">
    <rect x="40" y="450" width="920" height="290" fill="#F7F9FC" stroke="#BFBFBF"/>
    <text x="55" y="472" font-weight="bold" fill="#1F4E78" font-size="13">LEGENDA POZICIJA (odgovara tabeli "Osovine i vešanje")</text>

    <text x="55" y="495" fill="#404040">1</text>
    <text x="90" y="495" fill="#404040">Halfshaft to flange — 77 Nm (57-77) — VSK</text>

    <text x="55" y="515" fill="#404040">2/3</text>
    <text x="90" y="515" fill="#404040">Wheel half lock-nut — initial 115 Nm → final 170 Nm (isti spoj, 2 koraka) — VSK</text>

    <text x="55" y="535" fill="#404040">4</text>
    <text x="90" y="535" fill="#404040">Halfshaft to drive gear bolt — 50 Nm — VSK</text>

    <text x="55" y="555" fill="#404040">5</text>
    <text x="90" y="555" fill="#404040">Access plug, half-shaft bolt — 18 Nm (11-18) — STD</text>

    <text x="55" y="575" fill="#404040">6</text>
    <text x="90" y="575" fill="#404040">Drain/fill plug (osovina) — 18 Nm (11-18) — STD</text>

    <text x="55" y="595" fill="#404040">7</text>
    <text x="90" y="595" fill="#404040">Amortizer — donji nosač — 150 Nm — VSK</text>

    <text x="500" y="495" fill="#404040">8</text>
    <text x="530" y="495" fill="#404040">Amortizer — gornji nosač — 115 Nm — VSK</text>

    <text x="500" y="515" fill="#404040">9</text>
    <text x="530" y="515" fill="#404040">Opružno vešanje — U-obujmica (4 tačke po strani) — 195 Nm — VSK</text>

    <text x="500" y="535" fill="#404040">10</text>
    <text x="530" y="535" fill="#404040">Stabilizator (sway bar) — spona — 79 Nm — KSK</text>

    <text x="500" y="555" fill="#404040">11</text>
    <text x="530" y="555" fill="#404040">Kontrolno rame — na šasiju — 280 Nm — VSK</text>

    <text x="55" y="590" font-size="11" fill="#8B0000" font-style="italic"></text>
    <text x="55" y="610" font-size="11" fill="#8B0000" font-style="italic">Pozicije 2/3 = staged zatezanje istog spoja (wheel half lock-nut), ne dva odvojena vijka.</text>
    <text x="55" y="628" font-size="11" fill="#8B0000" font-style="italic">Shema prikazuje levu i desnu stranu osovine simetrično — svaka pozicija se ponavlja na obe strane vozila.</text>
    <text x="55" y="646" font-size="11" fill="#8B0000" font-style="italic">Crvena = VSK   Narandžasta = KSK   Siva = STD</text>
  </g>

  <text x="500" y="765" text-anchor="middle" font-size="10" fill="#8B0000">Napomena: shematski prikaz, nije u razmeri. Validirati protiv zvaničnog AM General TM 9-2320-280.</text>
</svg>

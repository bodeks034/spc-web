<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Arial, sans-serif">
  <rect width="1000" height="760" fill="#ffffff"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E78">SKLOP: TOČKOVI, NAPLACI I GEARED HUB — pozicije vijaka</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#595959">Brojevi pozicija odgovaraju koloni "Poz. br." u tabeli "Točkovi" (Excel šifrarnik)</text>

  <!-- Wheel + geared hub schematic -->
  <g stroke="#404040" stroke-width="2">
    <!-- Wheel/rim outer circle -->
    <circle cx="380" cy="360" r="220" fill="#EAF1F8"/>
    <!-- Tire representation ring -->
    <circle cx="380" cy="360" r="220" fill="none" stroke="#404040" stroke-width="10"/>
    <!-- Rim inner -->
    <circle cx="380" cy="360" r="150" fill="#F2F2F2"/>
    <!-- Beadlock ring -->
    <circle cx="380" cy="360" r="150" fill="none" stroke="#ED7D31" stroke-width="6" stroke-dasharray="14,6"/>
    <!-- Geared hub center -->
    <circle cx="380" cy="360" r="70" fill="#E2EFDA"/>
    <!-- Hub access cover -->
    <circle cx="380" cy="360" r="35" fill="#FFF2CC"/>
    <!-- Lug nuts ring positions handled below -->
  </g>

  <text x="380" y="620" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">naplatak (rim)</text>
  <text x="380" y="450" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">beadlock prsten</text>
  <text x="380" y="365" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">geared hub</text>

  <g font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 1,2 Lug nuts around rim circle (8 positions alternating tapered/flanged label) -->
  </g>

  <!-- Generate lug nut positions programmatically via fixed coordinates around radius 190 -->
  <g font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <circle cx="380" cy="170" r="15" fill="#C00000"/><text x="380" y="175">1</text>
    <circle cx="514" cy="226" r="15" fill="#C00000"/><text x="514" y="231">1</text>
    <circle cx="570" cy="360" r="15" fill="#C00000"/><text x="570" y="365">1</text>
    <circle cx="514" cy="494" r="15" fill="#C00000"/><text x="514" y="499">1</text>
    <circle cx="380" cy="550" r="15" fill="#C00000"/><text x="380" y="555">1</text>
    <circle cx="246" cy="494" r="15" fill="#C00000"/><text x="246" y="499">1</text>
    <circle cx="190" cy="360" r="15" fill="#C00000"/><text x="190" y="365">1</text>
    <circle cx="246" cy="226" r="15" fill="#C00000"/><text x="246" y="231">1</text>
  </g>

  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 3 hub access cover -->
    <circle cx="380" cy="360" r="14" fill="#7F7F7F"/><text x="380" y="365" font-size="11">3</text>

    <!-- 4 drain/fill plug hub -->
    <circle cx="415" cy="395" r="12" fill="#7F7F7F"/><text x="415" y="400" font-size="10">4</text>

    <!-- 5 beadlock pinch bolt -->
    <circle cx="380" cy="212" r="13" fill="#C00000"/><text x="380" y="217" font-size="10">5</text>
    <circle cx="380" cy="508" r="13" fill="#C00000"/><text x="380" y="513" font-size="10">5</text>

    <!-- 6 input seal plate -->
    <circle cx="345" cy="330" r="12" fill="#ED7D31"/><text x="345" y="335" font-size="10">6</text>

    <!-- 7 steering cover -->
    <circle cx="415" cy="325" r="12" fill="#C00000"/><text x="415" y="330" font-size="10">7</text>

    <!-- 8,9 runflat cam bolt (staged - same position, before/after) -->
    <circle cx="240" cy="290" r="15" fill="#C00000"/><text x="240" y="294" font-size="10">8/9</text>
    <circle cx="520" cy="290" r="15" fill="#C00000"/><text x="520" y="294" font-size="10">8/9</text>
  </g>

  <!-- Legend -->
  <g font-size="12">
    <rect x="640" y="120" width="320" height="600" fill="#F7F9FC" stroke="#BFBFBF"/>
    <text x="655" y="145" font-weight="bold" fill="#1F4E78" font-size="13">LEGENDA POZICIJA</text>
    <text x="655" y="163" font-size="11" fill="#595959" font-style="italic">(odgovara tabeli "Točkovi")</text>

    <text x="655" y="195" fill="#404040" font-weight="bold">1</text>
    <text x="655" y="215" fill="#404040" font-size="11">Lug nut, tapered (1-piece)</text>
    <text x="655" y="232" fill="#404040" font-size="11">149 Nm — VSK</text>
    <text x="655" y="249" fill="#404040" font-size="11">ILI flanged (2-piece) 190 Nm</text>
    <text x="655" y="266" fill="#8B0000" font-size="10" font-style="italic">TTY — ne ponovo koristiti!</text>

    <text x="655" y="298" fill="#404040" font-weight="bold">3</text>
    <text x="655" y="316" fill="#404040" font-size="11">Geared hub access cover</text>
    <text x="655" y="333" fill="#404040" font-size="11">20 Nm — STD</text>

    <text x="655" y="360" fill="#404040" font-weight="bold">4</text>
    <text x="655" y="378" fill="#404040" font-size="11">Geared hub drain/fill plug</text>
    <text x="655" y="395" fill="#404040" font-size="11">18 Nm — STD</text>

    <text x="655" y="422" fill="#404040" font-weight="bold">5</text>
    <text x="655" y="440" fill="#404040" font-size="11">Geared hub beadlock pinch</text>
    <text x="655" y="457" fill="#404040" font-size="11">bolt — 68 Nm — VSK</text>

    <text x="655" y="484" fill="#404040" font-weight="bold">6</text>
    <text x="655" y="502" fill="#404040" font-size="11">Input seal plate — 40 Nm</text>
    <text x="655" y="519" fill="#404040" font-size="11">— KSK</text>

    <text x="655" y="546" fill="#404040" font-weight="bold">7</text>
    <text x="655" y="564" fill="#404040" font-size="11">Steering cover — 88 Nm — VSK</text>

    <text x="655" y="591" fill="#404040" font-weight="bold">8/9</text>
    <text x="655" y="609" fill="#404040" font-size="11">Runflat cam bolt: 9.5 Nm</text>
    <text x="655" y="626" fill="#404040" font-size="11">(pre) → 68 Nm (posle) — VSK</text>
    <text x="655" y="643" fill="#8B0000" font-size="10" font-style="italic">Isti spoj, 2 faze podešavanja</text>
  </g>

  <text x="500" y="700" text-anchor="middle" font-size="10" fill="#8B0000">Napomena: lug nuts prikazani na 8 pozicija (standardni HMMWV raspored). Zatezanje isključivo dijagonalnim redosledom, ne kružno.</text>
  <text x="500" y="720" text-anchor="middle" font-size="10" fill="#8B0000">Validirati protiv zvaničnog AM General TM 9-2320-280.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, sans-serif">
  <rect width="1000" height="700" fill="#ffffff"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E78">SKLOP: SISTEM UPRAVLJANJA (STEERING) — pozicije vijaka</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#595959">Brojevi pozicija odgovaraju koloni "Poz. br." u tabeli "Upravljanje" (Excel šifrarnik)</text>

  <g stroke="#404040" stroke-width="2">
    <!-- Steering column (diagonal from wheel to gearbox) -->
    <rect x="150" y="150" width="30" height="220" rx="8" fill="#EAF1F8" transform="rotate(25 165 260)"/>
    <!-- Steering wheel circle -->
    <circle cx="180" cy="140" r="55" fill="none" stroke="#404040" stroke-width="8"/>
    <!-- Steering gearbox housing -->
    <rect x="260" y="330" width="90" height="90" rx="10" fill="#E2EFDA"/>
    <!-- Pitman arm -->
    <rect x="350" y="365" width="120" height="20" rx="6" fill="#FCE4D6"/>
    <!-- Tie rod -->
    <rect x="470" y="368" width="260" height="14" fill="#F2F2F2"/>
    <!-- Tie rod end (right) -->
    <circle cx="750" cy="375" r="20" fill="#FFF2CC"/>
    <!-- Steering knuckle -->
    <rect x="760" y="330" width="45" height="90" rx="8" fill="#D9E1F2"/>
    <!-- Power steering pump box -->
    <rect x="120" y="420" width="110" height="70" rx="8" fill="#EAF1F8"/>
    <!-- Reservoir -->
    <circle cx="90" cy="380" r="30" fill="#E2EFDA"/>
  </g>

  <text x="180" y="215" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">volan</text>
  <text x="305" y="440" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">kućište upravljačkog mehanizma</text>
  <text x="410" y="405" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">pitman rame</text>
  <text x="750" y="410" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">tie rod end</text>
  <text x="90" y="345" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">rezervoar</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">servo pumpa</text>

  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 1 rezervoar nosac -->
    <circle cx="90" cy="380" r="14" fill="#7F7F7F"/><text x="90" y="385" font-size="11">1</text>

    <!-- 2 tie rod end matica -->
    <circle cx="750" cy="375" r="16" fill="#C00000"/><text x="750" y="380" font-size="12">2</text>

    <!-- 3 volanski stub na sasiju -->
    <circle cx="200" cy="230" r="14" fill="#C00000"/><text x="200" y="235" font-size="11">3</text>

    <!-- 4 servo pumpa nosac na motor -->
    <circle cx="175" cy="425" r="14" fill="#ED7D31"/><text x="175" y="430" font-size="11">4</text>

    <!-- 5 pitman rame matica -->
    <circle cx="345" cy="375" r="16" fill="#C00000"/><text x="345" y="380" font-size="12">5</text>

    <!-- 6 kuciste upravljackog mehanizma na sasiju -->
    <circle cx="280" cy="345" r="14" fill="#C00000"/><text x="280" y="350" font-size="11">6</text>
    <circle cx="335" cy="345" r="14" fill="#C00000"/><text x="335" y="350" font-size="11">6</text>
  </g>

  <!-- Legend -->
  <g font-size="12">
    <rect x="40" y="540" width="920" height="145" fill="#F7F9FC" stroke="#BFBFBF"/>
    <text x="55" y="562" font-weight="bold" fill="#1F4E78" font-size="13">LEGENDA POZICIJA (odgovara tabeli "Upravljanje")</text>

    <text x="55" y="585" fill="#404040">1</text>
    <text x="90" y="585" fill="#404040">Rezervoar servo upravljača — nosač — 46 Nm — STD</text>

    <text x="55" y="605" fill="#404040">2</text>
    <text x="90" y="605" fill="#404040">Upravljačka spona (tie rod end) — matica — 195 Nm — VSK</text>

    <text x="55" y="625" fill="#404040">3</text>
    <text x="90" y="625" fill="#404040">Volanski stub — na šasiju — 67 Nm — VSK</text>

    <text x="500" y="585" fill="#404040">4</text>
    <text x="530" y="585" fill="#404040">Servo pumpa — nosač na motor — 46 Nm — KSK</text>

    <text x="500" y="605" fill="#404040">5</text>
    <text x="530" y="605" fill="#404040">Pitman rame — matica — 400 Nm + ugao — VSK</text>

    <text x="500" y="625" fill="#404040">6</text>
    <text x="530" y="625" fill="#404040">Kućište upravljačkog mehanizma — na šasiju — 185 Nm — VSK</text>

    <text x="55" y="655" font-size="11" fill="#8B0000" font-style="italic">Crvena = VSK   Narandžasta = KSK   Siva = STD. Svi upravljački spojevi bez izuzetka su bezbednosno kritični po tipu funkcije.</text>
  </g>

  <text x="500" y="690" text-anchor="middle" font-size="10" fill="#8B0000">Napomena: generičke vrednosti (VDI 2230) — validirati protiv zvaničnog OEM/TM dokumenta.</text>
</svg>

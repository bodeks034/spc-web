<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Arial, sans-serif">
  <rect width="1000" height="720" fill="#ffffff"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E78">SKLOP: KOČIONI SISTEM — pozicije vijaka</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#595959">Brojevi pozicija odgovaraju koloni "Poz. br." u tabeli "Kočnice" (Excel šifrarnik)</text>

  <!-- Brake disc + caliper schematic -->
  <g stroke="#404040" stroke-width="2">
    <!-- Brake disc (rotor) -->
    <circle cx="380" cy="330" r="150" fill="#EAF1F8"/>
    <circle cx="380" cy="330" r="60" fill="#F2F2F2"/>
    <!-- Caliper body -->
    <rect x="320" y="180" width="120" height="80" rx="10" fill="#FCE4D6"/>
    <!-- Caliper yoke/adapter -->
    <rect x="300" y="150" width="160" height="35" rx="6" fill="#FFF2CC"/>
    <!-- Brake pad backing -->
    <rect x="335" y="255" width="90" height="20" rx="4" fill="#D9E1F2"/>
    <!-- Bleed screw boss -->
    <circle cx="450" cy="200" r="14" fill="#EAF1F8"/>
    <!-- Master cylinder (separate box, top right) -->
    <rect x="650" y="140" width="140" height="90" rx="8" fill="#E2EFDA"/>
    <!-- Parking brake lever -->
    <rect x="650" y="420" width="150" height="35" rx="6" fill="#EAF1F8"/>
    <!-- Cable bracket -->
    <rect x="650" y="480" width="120" height="30" rx="6" fill="#F2F2F2"/>
  </g>

  <text x="380" y="500" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">kočioni disk (rotor)</text>
  <text x="380" y="140" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">caliper yoke / adapter</text>
  <text x="720" y="120" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">master cilindar</text>
  <text x="725" y="470" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">ručna kočnica (lever)</text>
  <text x="710" y="525" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">cable bracket</text>

  <g font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 1 caliper yoke to adapter -->
    <circle cx="320" cy="165" r="14" fill="#C00000"/><text x="320" y="170" font-size="11">1</text>
    <circle cx="440" cy="165" r="14" fill="#C00000"/><text x="440" y="170" font-size="11">1</text>

    <!-- 2 caliper guide pins -->
    <circle cx="330" cy="220" r="13" fill="#C00000"/><text x="330" y="225" font-size="11">2</text>
    <circle cx="430" cy="220" r="13" fill="#C00000"/><text x="430" y="225" font-size="11">2</text>

    <!-- 3 bleed screw -->
    <circle cx="450" cy="200" r="12" fill="#7F7F7F"/><text x="450" y="204" font-size="10">3</text>

    <!-- 4 cable bracket screws -->
    <circle cx="670" cy="480" r="12" fill="#7F7F7F"/><text x="670" y="484" font-size="10">4</text>
    <circle cx="750" cy="480" r="12" fill="#7F7F7F"/><text x="750" y="484" font-size="10">4</text>

    <!-- 5 lever retaining screw -->
    <circle cx="670" cy="425" r="12" fill="#ED7D31"/><text x="670" y="430" font-size="10">5</text>

    <!-- 6 kocioni cilindar nosac na osovinu -->
    <circle cx="380" cy="330" r="14" fill="#C00000"/><text x="380" y="335" font-size="11">6</text>

    <!-- 7 kociona plocica vijak fiksacije -->
    <circle cx="345" cy="260" r="11" fill="#C00000"/><text x="345" y="264" font-size="10">7</text>
    <circle cx="415" cy="260" r="11" fill="#C00000"/><text x="415" y="264" font-size="10">7</text>

    <!-- 8 master cilindar nosac -->
    <circle cx="670" cy="150" r="13" fill="#C00000"/><text x="670" y="155" font-size="11">8</text>
    <circle cx="770" cy="150" r="13" fill="#C00000"/><text x="770" y="155" font-size="11">8</text>
  </g>

  <!-- Legend -->
  <g font-size="12">
    <rect x="40" y="555" width="920" height="130" fill="#F7F9FC" stroke="#BFBFBF"/>
    <text x="55" y="577" font-weight="bold" fill="#1F4E78" font-size="13">LEGENDA POZICIJA (odgovara tabeli "Kočnice")</text>

    <text x="55" y="600" fill="#404040">1</text>
    <text x="90" y="600" fill="#404040">Caliper yoke to adapter — 54 Nm — VSK</text>

    <text x="55" y="620" fill="#404040">2</text>
    <text x="90" y="620" fill="#404040">Caliper guide pins — 54 Nm, lubrikovano — VSK</text>

    <text x="55" y="640" fill="#404040">3</text>
    <text x="90" y="640" fill="#404040">Bleed screw — 20 Nm (8-20) — STD</text>

    <text x="500" y="600" fill="#404040">4</text>
    <text x="530" y="600" fill="#404040">Cable bracket screws — 34 Nm (27-34) — STD</text>

    <text x="500" y="620" fill="#404040">5</text>
    <text x="530" y="620" fill="#404040">Lever retaining screw (parking brake) — 34 Nm — KSK</text>

    <text x="500" y="640" fill="#404040">6</text>
    <text x="530" y="640" fill="#404040">Kočioni cilindar nosač na osovinu — 115 Nm — VSK</text>

    <text x="55" y="663" fill="#404040">7</text>
    <text x="90" y="663" fill="#404040">Kočiona pločica — vijak fiksacije — 23 Nm — VSK</text>

    <text x="500" y="663" fill="#404040">8</text>
    <text x="530" y="663" fill="#404040">Master cilindar — nosač — 46 Nm — VSK</text>
  </g>

  <text x="500" y="705" text-anchor="middle" font-size="10" fill="#8B0000">Napomena: shematski prikaz, nije u razmeri. Kočioni spojevi su gotovo isključivo VSK — poštovati redosled i 100% kontrolu.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Arial, sans-serif">
  <rect width="1000" height="760" fill="#ffffff"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E78">SKLOP: MENJAČ I TRANSFER CASE — pozicije vijaka</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#595959">Brojevi pozicija odgovaraju koloni "Poz. br." u tabeli "Menjač i transfer case" (Excel šifrarnik)</text>

  <!-- Schematic bodies -->
  <g stroke="#404040" stroke-width="2">
    <!-- Transmission housing -->
    <rect x="150" y="180" width="280" height="220" rx="10" fill="#EAF1F8"/>
    <!-- Transfer case housing -->
    <rect x="460" y="200" width="220" height="180" rx="10" fill="#E2EFDA"/>
    <!-- Output flange (rear, circle) -->
    <circle cx="770" cy="290" r="45" fill="#FCE4D6"/>
    <!-- PTO cover -->
    <rect x="500" y="400" width="90" height="50" rx="6" fill="#FFF2CC"/>
    <!-- Drain/fill plug boss -->
    <circle cx="200" cy="410" r="18" fill="#D9E1F2"/>
    <!-- Mounting brackets -->
    <rect x="150" y="140" width="50" height="35" rx="4" fill="#EAF1F8"/>
    <rect x="600" y="140" width="50" height="35" rx="4" fill="#EAF1F8"/>
    <!-- U-joint yoke -->
    <rect x="815" y="270" width="70" height="40" rx="6" fill="#F2F2F2"/>
  </g>

  <text x="290" y="300" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">menjač (transmission)</text>
  <text x="570" y="295" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">transfer case</text>
  <text x="770" y="345" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">output flange</text>
  <text x="545" y="465" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">PTO poklopac</text>
  <text x="200" y="440" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">drain/fill plug</text>
  <text x="850" y="330" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">U-joint yoke</text>

  <g font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 1 torque converter to flywheel (near transmission front) -->
    <circle cx="170" cy="260" r="14" fill="#ED7D31"/><text x="170" y="265">1</text>

    <!-- 2 mounting bracket to housing bolts -->
    <circle cx="175" cy="157" r="13" fill="#C00000"/><text x="175" y="162">2</text>
    <circle cx="625" cy="157" r="13" fill="#C00000"/><text x="625" y="162">2</text>

    <!-- 3,4,5 output flange locknut (initial/final/type B - same physical position, staged) -->
    <circle cx="770" cy="290" r="15" fill="#C00000"/><text x="770" y="295" font-size="12">3/4/5</text>

    <!-- 6 U-joint to pinion yoke -->
    <circle cx="850" cy="290" r="14" fill="#C00000"/><text x="850" y="295">6</text>

    <!-- 7 drain/fill plug -->
    <circle cx="200" cy="410" r="14" fill="#7F7F7F"/><text x="200" y="415">7</text>

    <!-- 8 cover bolt (transmission housing edge points) -->
    <circle cx="160" cy="220" r="12" fill="#7F7F7F"/><text x="160" y="224" font-size="11">8</text>
    <circle cx="160" cy="360" r="12" fill="#7F7F7F"/><text x="160" y="364" font-size="11">8</text>
    <circle cx="420" cy="220" r="12" fill="#7F7F7F"/><text x="420" y="224" font-size="11">8</text>
    <circle cx="420" cy="360" r="12" fill="#7F7F7F"/><text x="420" y="364" font-size="11">8</text>

    <!-- 9 transfer case nosac na sasiju -->
    <circle cx="480" cy="380" r="13" fill="#C00000"/><text x="480" y="385">9</text>
    <circle cx="660" cy="380" r="13" fill="#C00000"/><text x="660" y="385">9</text>

    <!-- 10 PTO poklopac -->
    <circle cx="545" cy="425" r="13" fill="#8497B0"/><text x="545" y="430">10</text>
  </g>

  <!-- Legend -->
  <g font-size="12">
    <rect x="40" y="530" width="920" height="200" fill="#F7F9FC" stroke="#BFBFBF"/>
    <text x="55" y="552" font-weight="bold" fill="#1F4E78" font-size="13">LEGENDA POZICIJA (odgovara tabeli "Menjač i transfer case")</text>

    <text x="55" y="575" fill="#404040">1</text>
    <text x="90" y="575" fill="#404040">Torque converter to flywheel — 46 Nm — KSK/VSK</text>

    <text x="55" y="595" fill="#404040">2</text>
    <text x="90" y="595" fill="#404040">Mounting bracket to housing bolts — 185 Nm (169-203) — VSK</text>

    <text x="55" y="615" fill="#404040">3/4/5</text>
    <text x="90" y="615" fill="#404040">Output flange locknut — initial 115 Nm → final 170 Nm → tip B do 265 Nm (isti spoj, 2-3 koraka) — VSK</text>

    <text x="55" y="635" fill="#404040">6</text>
    <text x="90" y="635" fill="#404040">U-joint to pinion yoke (5/16" fine) — 37 Nm (27-37) — VSK</text>

    <text x="500" y="575" fill="#404040">7</text>
    <text x="530" y="575" fill="#404040">Drain/fill plug — 24 Nm (18-24) — STD</text>

    <text x="500" y="595" fill="#404040">8</text>
    <text x="530" y="595" fill="#404040">Poklopac (cover bolt) — 22 Nm (16-22), sekvenca — STD</text>

    <text x="500" y="615" fill="#404040">9</text>
    <text x="530" y="615" fill="#404040">Transfer case — nosač na šasiju — 185 Nm — VSK</text>

    <text x="500" y="635" fill="#404040">10</text>
    <text x="530" y="635" fill="#404040">PTO poklopac — 23 Nm — STD</text>

    <text x="55" y="665" font-size="11" fill="#8B0000" font-style="italic">Pozicije 3/4/5 predstavljaju STAGED zatezanje istog spoja (output flange) — ne 3 različita vijka, već 2-3 koraka na istoj matici.</text>
    <text x="55" y="685" font-size="11" fill="#8B0000" font-style="italic">Crvena = VSK   Narandžasta = KSK   Siva/Plava = STD</text>
  </g>

  <text x="500" y="750" text-anchor="middle" font-size="10" fill="#8B0000">Napomena: shematski prikaz, nije u razmeri. Validirati protiv zvaničnog AM General TM 9-2320-280.</text>
</svg>

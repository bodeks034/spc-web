<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Arial, sans-serif">
  <rect width="1000" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E78">SKLOP: MOTOR — pozicije vijaka</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#595959">Brojevi pozicija odgovaraju koloni "Poz. br." u tabeli "Motor" (Excel šifrarnik)</text>

  <!-- Engine block schematic (simplified top/front composite view) -->
  <g stroke="#404040" stroke-width="2" fill="#EAF1F8">
    <!-- Engine block main body -->
    <rect x="230" y="150" width="360" height="300" rx="10"/>
    <!-- Cylinder head on top -->
    <rect x="250" y="90" width="320" height="70" rx="6" fill="#D9E1F2"/>
    <!-- Oil pan bottom -->
    <rect x="250" y="450" width="320" height="60" rx="6" fill="#F2F2F2"/>
    <!-- Valve cover -->
    <rect x="270" y="60" width="280" height="35" rx="4" fill="#FFF2CC"/>
    <!-- Intake manifold (side) -->
    <rect x="590" y="180" width="90" height="140" rx="6" fill="#E2EFDA"/>
    <!-- Exhaust manifold (opposite side) -->
    <rect x="140" y="180" width="90" height="140" rx="6" fill="#FCE4D6"/>
    <!-- Crankshaft pulley (front, circle) -->
    <circle cx="230" cy="480" r="34" fill="#D9E1F2"/>
    <!-- Flywheel (rear, circle) -->
    <circle cx="590" cy="480" r="40" fill="#FCE4D6"/>
    <!-- Alternator bracket -->
    <rect x="130" y="420" width="55" height="45" rx="4" fill="#EAF1F8"/>
    <!-- Turbo -->
    <rect x="700" y="200" width="60" height="55" rx="6" fill="#EAF1F8"/>
  </g>

  <!-- Labels for components -->
  <text x="410" y="45" text-anchor="middle" font-size="11" fill="#595959"></text>
  <text x="410" y="78" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">poklopac ventila</text>
  <text x="410" y="105" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">glava motora</text>
  <text x="410" y="300" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">blok motora</text>
  <text x="410" y="475" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">uljna korpa</text>
  <text x="635" y="255" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">usisna grana</text>
  <text x="185" y="255" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">izduvna grana</text>
  <text x="230" y="530" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">remenica</text>
  <text x="590" y="535" text-anchor="middle" font-size="11" fill="#404040" font-style="italic">zamajac</text>
  <text x="157" y="480" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">alternator</text>
  <text x="730" y="270" text-anchor="middle" font-size="10" fill="#404040" font-style="italic">turbo</text>

  <!-- Bolt position markers -->
  <!-- helper style: red circle w/ white bold number -->
  <g font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- 1,2,3 glava motora (cylinder head bolts, spread along head) -->
    <circle cx="300" cy="125" r="14" fill="#C00000"/><text x="300" y="130">1</text>
    <circle cx="410" cy="125" r="14" fill="#C00000"/><text x="410" y="130">2</text>
    <circle cx="520" cy="125" r="14" fill="#C00000"/><text x="520" y="130">3</text>

    <!-- 4 crankshaft pulley bolt -->
    <circle cx="230" cy="480" r="14" fill="#C00000"/><text x="230" y="485">4</text>

    <!-- 5 flywheel -->
    <circle cx="590" cy="480" r="14" fill="#C00000"/><text x="590" y="485">5</text>

    <!-- 6 torque converter to flywheel (offset near flywheel) -->
    <circle cx="640" cy="500" r="14" fill="#ED7D31"/><text x="640" y="505">6</text>

    <!-- 7 oil pan bolts (multiple small points along pan edge) -->
    <circle cx="270" cy="455" r="12" fill="#7F7F7F"/><text x="270" y="459" font-size="11">7</text>
    <circle cx="330" cy="455" r="12" fill="#7F7F7F"/><text x="330" y="459" font-size="11">7</text>
    <circle cx="470" cy="455" r="12" fill="#7F7F7F"/><text x="470" y="459" font-size="11">7</text>
    <circle cx="530" cy="455" r="12" fill="#7F7F7F"/><text x="530" y="459" font-size="11">7</text>

    <!-- 8 valve cover bolts -->
    <circle cx="300" cy="78" r="12" fill="#7F7F7F"/><text x="300" y="82" font-size="11">8</text>
    <circle cx="410" cy="78" r="12" fill="#7F7F7F"/><text x="410" y="82" font-size="11">8</text>
    <circle cx="520" cy="78" r="12" fill="#7F7F7F"/><text x="520" y="82" font-size="11">8</text>

    <!-- 9 intake manifold -->
    <circle cx="635" cy="220" r="13" fill="#548235"/><text x="635" y="225">9</text>
    <circle cx="635" cy="290" r="13" fill="#548235"/><text x="635" y="295">9</text>

    <!-- 10 exhaust manifold -->
    <circle cx="185" cy="220" r="13" fill="#C55A11"/><text x="185" y="225">10</text>
    <circle cx="185" cy="290" r="13" fill="#C55A11"/><text x="185" y="295">10</text>

    <!-- 11 alternator bracket -->
    <circle cx="157" cy="443" r="13" fill="#8497B0"/><text x="157" y="448">11</text>

    <!-- 12 turbo -->
    <circle cx="730" cy="228" r="13" fill="#8497B0"/><text x="730" y="233">12</text>
  </g>

  <!-- Sequence arrows for cylinder head (diagonal tightening pattern hint) -->
  <g stroke="#C00000" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
    <path d="M300,139 L410,139" marker-end="url(#arrow)"/>
    <path d="M410,139 L520,139" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#C00000"/>
    </marker>
  </defs>

  <!-- Legend / table -->
  <g font-size="12">
    <rect x="40" y="560" width="920" height="185" fill="#F7F9FC" stroke="#BFBFBF"/>
    <text x="55" y="582" font-weight="bold" fill="#1F4E78" font-size="13">LEGENDA POZICIJA (odgovara tabeli "Motor")</text>

    <text x="55" y="605" fill="#404040">1-3</text>
    <text x="90" y="605" fill="#404040">Glava motora — vijci (dijagonalna sekvenca, 3 prolaza: 50% → 80% → +90° ugao) — VSK</text>

    <text x="55" y="625" fill="#404040">4</text>
    <text x="90" y="625" fill="#404040">Kolenasto vratilo — remenica (crankshaft pulley bolt) — VSK</text>

    <text x="55" y="645" fill="#404040">5</text>
    <text x="90" y="645" fill="#404040">Zamajac na kolenasto vratilo (dijagonalna sekvenca) — VSK</text>

    <text x="55" y="665" fill="#404040">6</text>
    <text x="90" y="665" fill="#404040">Torque converter to flywheel (ako AT) — KSK</text>

    <text x="500" y="605" fill="#404040">7</text>
    <text x="530" y="605" fill="#404040">Uljna korpa — vijci (sekvenca: rubovi → centar) — STD</text>

    <text x="500" y="625" fill="#404040">8</text>
    <text x="530" y="625" fill="#404040">Poklopac ventila — vijci (sekvenca) — STD</text>

    <text x="500" y="645" fill="#404040">9</text>
    <text x="530" y="645" fill="#404040">Usisna grana (sekvenca krstasto) — KSK</text>

    <text x="500" y="665" fill="#404040">10</text>
    <text x="530" y="665" fill="#404040">Izduvna grana (sekvenca krstasto, kontrola termičkog zatezanja) — KSK</text>

    <text x="55" y="690" fill="#404040">11</text>
    <text x="90" y="690" fill="#404040">Alternator — nosač — STD</text>

    <text x="500" y="690" fill="#404040">12</text>
    <text x="530" y="690" fill="#404040">Turbo — nosač / flanša — KSK</text>

    <text x="55" y="720" font-size="11" fill="#8B0000" font-style="italic">Crvena = VSK (vitalno sigurnosna)   Narandžasta = KSK   Siva/Plava/Zelena = STD ili sekundarna pozicija</text>
  </g>

  <text x="500" y="750" text-anchor="middle" font-size="10" fill="#8B0000">Napomena: shematski prikaz, nije u razmeri. Redosled zatezanja glave motora mora se validirati protiv zvaničnog OEM/TM dokumenta.</text>
</svg>
